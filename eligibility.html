<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eligibility Form | SchemeWise AI</title>

    <link rel="stylesheet" href="css/Style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <h3 class="text-white">
                <i class="fa-solid fa-robot"></i>
                SchemeWise AI
            </h3>

            <a href="dashboard.html" class="btn btn-light">
                Dashboard
            </a>
        </div>
    </nav>

    <div class="container mt-5 mb-5">

        <div class="card shadow p-4">

            <h2 class="text-center mb-4">

                Government Scheme Eligibility Form

            </h2>

            <form id="eligibilityForm">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control" id="age" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Gender</label>
                        <select class="form-select" id="gender" required>
                            <option value="">Select Gender</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">State</label>
                        <input type="text" class="form-control" id="state" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Occupation</label>
                        <select class="form-select" id="occupation" required>
                            <option value="">Select Occupation</option>
                            <option>Student</option>
                            <option>Farmer</option>
                            <option>Government Employee</option>
                            <option>Private Employee</option>
                            <option>Business</option>
                            <option>Self Employed</option>
                            <option>Unemployed</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Annual Income (₹)</label>
                        <input type="number" class="form-control" id="income" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Education</label>
                        <select class="form-select" id="education" required>
                            <option value="">Select Education</option>
                            <option>Below 10th</option>
                            <option>10th Pass</option>
                            <option>12th Pass</option>
                            <option>Diploma</option>
                            <option>Graduate</option>
                            <option>Post Graduate</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Category</label>
                        <select class="form-select" id="category" required>
                            <option value="">Select Category</option>
                            <option>General</option>
                            <option>OBC</option>
                            <option>SC</option>
                            <option>ST</option>
                            <option>EWS</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Disability</label>
                        <select class="form-select" id="disability" required>
                            <option value="">Select</option>
                            <option>No</option>
                            <option>Yes</option>
                        </select>
                    </div>

                </div>

                <button type="submit" class="btn btn-primary w-100 mt-3">

                    <i class="fa-solid fa-magnifying-glass"></i>

                    Check Eligibility

                </button>

            </form>

        </div>

    </div>

   <script type="module" src="js/eligibility.js"></script>

</body>

</html>
